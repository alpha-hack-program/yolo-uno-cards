gitSslVerify: true

dataScienceProjectDisplayName: yolo
dataScienceProjectNamespace: yolo

instanceName: yolo
partOf: yolo

createNamespace: true

kfpUpsertTektonPipelineName: kfp-upsert-pl

pipelinesWorkspaceDefaultSize: 2Gi

pipelinesServiceAccountName: build-bot-sa

eventListenerServiceAccountName: pipeline

rhoaiModelRegistriesNamespace: rhoai-model-registries

pipelines:
  enabled: true
  connection:
    name: pipelines
    displayName: Pipelines S3 Storage
    description: S3-compatible storage connection for ML pipelines
    type: s3
    typeProtocol: s3
    typeRef: s3
    scheme: http
    host: minio.ic-shared-minio.svc
    port: "9000"
    awsAccessKeyId: minio
    awsSecretAccessKey: minio123
    awsDefaultRegion: none
    awsS3Bucket: pipelines

pythonImage:
  version: "3.9"
  name: "python"
  tag: "3.9-ubi8"

mountCaCerts: "false"

setup:
  image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
